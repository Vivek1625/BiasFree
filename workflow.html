<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BiasFree — Workflow Diagram</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #ffffff; display: flex; justify-content: center; padding: 40px; }
    svg { display: block; background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
    @media print { body { background: white; padding: 0; } svg { box-shadow: none; border-radius: 0; } }
  </style>
</head>
<body>
<svg width="860" height="980" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94A3B8"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16A34A"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D97706"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="860" height="980" fill="white" rx="16"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="860" height="70" fill="#0F172A" rx="16"/>
  <rect x="0" y="54" width="860" height="16" fill="#0F172A"/>
  <text x="430" y="30" text-anchor="middle" font-size="19" font-weight="800" fill="white">BiasFree — Architecture &amp; Data Flow</text>
  <text x="430" y="52" text-anchor="middle" font-size="11" fill="#64748B">Google Solution Challenge 2026 · UN SDG Target 10.3 · Reduced Inequalities</text>

  <!-- ───── LAYER BANDS ───── -->
  <!-- Browser layer -->
  <rect x="20" y="84" width="820" height="406" rx="10" fill="#F8FAFF" stroke="#DBEAFE" stroke-width="1.5"/>
  <text x="36" y="102" font-size="9" font-weight="700" fill="#93C5FD" letter-spacing="1.2">BROWSER  ·  CLIENT-SIDE EXECUTION</text>

  <!-- Google Services layer -->
  <rect x="20" y="506" width="820" height="200" rx="10" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="36" y="524" font-size="9" font-weight="700" fill="#6EE7B7" letter-spacing="1.2">GOOGLE CLOUD SERVICES</text>

  <!-- Infrastructure layer -->
  <rect x="20" y="722" width="820" height="82" rx="10" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="36" y="740" font-size="9" font-weight="700" fill="#CBD5E1" letter-spacing="1.2">SUPPORTING INFRASTRUCTURE</text>

  <!-- Box 1: User Uploads CSV -->
  <rect x="290" y="108" width="280" height="48" rx="24" fill="#0F172A"/>
  <text x="430" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="white">User Uploads CSV File</text>
  <text x="430" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#94A3B8">public/index.html · Drag-and-drop or file picker</text>

  <!-- Arrow -->
  <line x1="430" y1="156" x2="430" y2="178" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: PapaParse -->
  <rect x="310" y="180" width="240" height="48" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="430" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">PapaParse</text>
  <text x="430" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#3B82F6">CSV parsing · Runs entirely in browser</text>

  <!-- Arrow -->
  <line x1="430" y1="228" x2="430" y2="252" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3: Bias Engine -->
  <rect x="240" y="254" width="380" height="88" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="430" y="276" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">Bias Engine (JavaScript)</text>
  <text x="430" y="294" text-anchor="middle" font-size="10" font-weight="600" fill="#3B82F6">Auto-detect outcome + sensitive columns</text>
  <text x="430" y="310" text-anchor="middle" font-size="10" font-weight="600" fill="#3B82F6">Calculate positive outcome rate per demographic group</text>
  <text x="430" y="326" text-anchor="middle" font-size="10" font-weight="600" fill="#3B82F6">DIR = min(rate) / max(rate)  ·  80% Rule / Four-Fifths</text>

  <!-- Arrow -->
  <line x1="430" y1="342" x2="430" y2="364" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="430" y="404" text-anchor="middle" font-size="10" font-weight="600" fill="#3B82F6">Mean of all DIRs x 100  ·  0 – 100 scale</text>

  <!-- Arrow -->
  <line x1="430" y1="414" x2="430" y2="436" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 5: Render Results -->
  <rect x="280" y="438" width="300" height="48" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="430" y="458" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">Render Results</text>
  <text x="430" y="476" text-anchor="middle" font-size="10" font-weight="600" fill="#3B82F6">Fairness Gauge  ·  Bias Cards  ·  Fix Suggestions</text>

  <!-- Split: left to Gemini, right to Firestore -->
  <path d="M430 486 L430 498 L200 498 L200 528" stroke="#94A3B8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M430 486 L430 498 L660 498 L660 528" stroke="#94A3B8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Box 6a: Gemini API -->
  <rect x="60" y="530" width="280" height="84" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="200" y="551" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">Gemini API</text>
  <text x="200" y="569" text-anchor="middle" font-size="10" font-weight="600" fill="#B45309">gemini-3-flash-preview  (primary model)</text>
  <text x="200" y="585" text-anchor="middle" font-size="10" font-weight="600" fill="#B45309">4-model fallback chain  ·  Direct REST via fetch()</text>
  <text x="200" y="601" text-anchor="middle" font-size="10" font-weight="600" fill="#B45309">Quota-resilient  ·  Free-tier optimized</text>

  <!-- Arrow 6a → 7a -->
  <line x1="200" y1="614" x2="200" y2="622" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 7a: AI Explanation -->
  <rect x="60" y="624" width="280" height="48" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="200" y="644" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">AI Explanation</text>
  <text x="200" y="662" text-anchor="middle" font-size="10" font-weight="600" fill="#B45309">Gemini text → Markdown → HTML  ·  Updates UI</text>

  <!-- Box 6b: Cloud Firestore -->
  <rect x="520" y="530" width="280" height="68" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="660" y="551" text-anchor="middle" font-size="13" font-weight="700" fill="#15803D">Cloud Firestore</text>
  <text x="660" y="569" text-anchor="middle" font-size="10" font-weight="600" fill="#16A34A">analyses collection  ·  addDoc() via Firebase SDK</text>
  <text x="660" y="585" text-anchor="middle" font-size="10" font-weight="600" fill="#16A34A">Saved only when user is authenticated</text>

  <!-- Arrow 6b → 7b -->
  <line x1="660" y1="598" x2="660" y2="622" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 7b: history.html -->
  <rect x="520" y="624" width="280" height="48" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="660" y="644" text-anchor="middle" font-size="13" font-weight="700" fill="#15803D">public/history.html</text>
  <text x="660" y="662" text-anchor="middle" font-size="10" font-weight="600" fill="#16A34A">Past analyses dashboard  ·  Expandable AI report cards</text>

  <!-- Auth gate dashed arrow to Firestore -->
  <path d="M450 762 L450 714 L660 714 L660 672" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-g)"/>
  <text x="570" y="708" text-anchor="middle" font-size="12" font-weight="600" fill="#64748B">auth gate</text>

  <!-- Firebase Hosting -->

  <text x="150" y="783" text-anchor="middle" font-size="10" font-weight="600" fill="#94A3B8">Serves public/  ·  biasfree-642026.web.app</text>

  <!-- Firebase Auth -->
  <rect x="320" y="748" width="220" height="44" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="430" y="767" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">Firebase Auth</text>
  <text x="430" y="783" text-anchor="middle" font-size="10" font-weight="600" fill="#94A3B8">Google Sign-In  ·  OAuth 2.0 popup</text>

  <text x="710" y="767" text-anchor="middle" font-size="12" font-weight="700" fill="#94A3B8">Cloud Functions</text>
  <text x="710" y="781" text-anchor="middle" font-size="10" font-weight="600" fill="#CBD5E1">functions/main.py  ·  Python 3.12</text>
  <text x="710" y="796" text-anchor="middle" font-size="10" font-weight="600" fill="#CBD5E1">Architectural Reserve  ·  Zero production cost</text>

  <!-- config.js note -->
  <rect x="20" y="820" width="820" height="50" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="430" y="836" text-anchor="middle" font-size="10" font-weight="700" fill="#B45309">config.js</text>
  <text x="430" y="851" text-anchor="middle" font-size="10" font-weight="600" fill="#B45309">Served by Firebase Hosting  ·  Gitignored from GitHub  ·  Secured Client-Side Injection</text>
  <text x="430" y="866" text-anchor="middle" font-size="10" font-weight="600" fill="#B45309">HTTP Referrer Restricted to production domain via Google Cloud Console</text>

  <line x1="20" y1="874" x2="840" y2="874" stroke="#E2E8F0" stroke-width="1"/>

  <rect x="60" y="886" width="12" height="12" rx="3" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>

  <rect x="230" y="886" width="12" height="12" rx="3" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="248" y="897" font-size="10" fill="#64748B">Gemini AI</text>

  <rect x="360" y="886" width="12" height="12" rx="3" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="378" y="897" font-size="10" fill="#64748B">Firebase (Google Cloud)</text>

  <rect x="536" y="886" width="12" height="12" rx="3" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="554" y="897" font-size="10" fill="#64748B">Infrastructure</text>

  <rect x="670" y="886" width="12" height="12" rx="3" fill="white" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="688" y="897" font-size="10" fill="#64748B">Standby / Optional</text>

  <!-- Bottom label -->
  <text x="430" y="958" text-anchor="middle" font-size="10" fill="#CBD5E1">GitHub: Vivek1625/BiasFree  ·  Firebase Project: biasfree-642026</text>
